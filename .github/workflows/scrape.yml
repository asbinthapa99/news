name: Hourly News Scrape

# Runs at the top of every hour via GitHub Actions (free).
# Calls /api/refresh on the Vercel deployment — no secret required.
on:
  schedule:
    - cron: "0 * * * *"   # every hour at :00
  workflow_dispatch:        # click "Run workflow" manually in GitHub UI

jobs:
  scrape:
    name: Trigger scrape
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Call /api/refresh on Vercel
        run: |
          URL=$(echo "${{ secrets.VERCEL_APP_URL }}" | sed 's:/*$::')
          STATUS=$(curl -s -L -o response.json -w "%{http_code}" \
            -X POST "${URL}/api/refresh" \
            -H "Content-Type: application/json")

          echo "HTTP status: $STATUS"
          echo "Response:" && cat response.json

          [ "$STATUS" = "200" ] || exit 1
