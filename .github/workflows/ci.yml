name: CI / CD

# Runs on every push and pull request to main.
# On push to main: validates, builds Docker image, then Railway auto-deploys
# (Railway watches GitHub and deploys automatically after this check passes).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Validate ────────────────────────────────────────────────────────────────
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check Python syntax (all modules)
        run: python -m py_compile app.py config.py database.py scraper.py

      - name: Verify all modules import cleanly
        # Use a dummy URL so config.py doesn't raise RuntimeError in CI.
        # We're only checking import correctness, not live DB connectivity.
        env:
          DATABASE_URL: postgresql://ci:ci@localhost/ci
        run: |
          python -c "
          import config, scraper
          print('config  ✓')
          print('scraper ✓')
          print('All modules OK')
          "

  # ── Docker build check ───────────────────────────────────────────────────────
  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: validate          # only runs if validate passes

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t pycast-news:${{ github.sha }} .

      - name: Smoke-test container starts
        run: |
          docker run -d \
            --name test-container \
            -p 8080:8080 \
            -e DATABASE_URL="postgresql://ci:ci@localhost/ci" \
            pycast-news:${{ github.sha }} || true
          sleep 5
          docker logs test-container 2>&1 | head -20 || true
          docker stop test-container 2>/dev/null || true
