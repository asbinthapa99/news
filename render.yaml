services:
  - type: web
    name: pycast-news
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 120 app:app
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        sync: false   # paste your Neon URL in the Render dashboard
      - key: PYTHON_VERSION
        value: 3.11.0
